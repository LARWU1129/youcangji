<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#1B324F">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>邮藏集 - AI 邮票识别</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
:root{--p:#1B324F;--g:#C8963E;--b:#FAF8F5;--s:#F5F1EB;--e:#E5E0D8;--m:#94A3B8;--t:#64748B;--i:#1A1A2E;--d:#E93D82;--fd:Georgia,'Noto Serif SC',serif;--fb:-apple-system,sans-serif;--sh:0 1px 4px rgba(27,50,79,0.08);--r:10px;--n:68px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fb);background:var(--b);color:var(--i);max-width:430px;margin:0 auto}
.p{display:none;flex-direction:column;height:100%;overflow-y:auto;padding-bottom:calc(var(--n)+12px)}
.p.a{display:flex}
.tb{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;position:sticky;top:0;z-index:20;background:var(--b)}
.tb h1{font-family:var(--fd);font-size:20px;color:var(--p)}
.nav{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:#FFF;border-top:1px solid var(--e);display:flex;justify-content:space-around;padding:6px 0 10px;z-index:100}
.ni{display:flex;flex-direction:column;align-items:center;gap:1px;border:none;background:none;cursor:pointer;padding:4px 16px;min-width:56px;color:var(--m);font-size:10px}
.ni svg{width:24px;height:24px;fill:none;stroke:var(--m);stroke-width:1.8}
.ni.a{color:var(--p);font-weight:600}
.ni.a svg{stroke:var(--p)}

/* Home */
.st{display:flex;gap:8px;padding:0 16px;margin:12px 0}
.sti{flex:1;background:#FFF;border-radius:var(--r);padding:14px 8px;text-align:center;box-shadow:var(--sh);border:1px solid var(--e)}
.sti .n{font-family:var(--fd);font-size:24px;font-weight:700;color:var(--p)}
.sti .l{font-size:11px;color:var(--m);margin-top:2px}
.scr{display:flex;gap:10px;overflow-x:auto;padding:0 16px;margin-bottom:16px;scrollbar-width:none}
.scr::-webkit-scrollbar{display:none}
.hc{flex-shrink:0;width:140px;background:#FFF;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--e);overflow:hidden;cursor:pointer}
.hc .th{width:100%;height:90px;display:flex;align-items:center;justify-content:center;background:var(--s);font-family:var(--fd);font-size:24px;color:var(--g)}
.hc .if{padding:8px 10px}
.hc .nm{font-size:13px;font-weight:600}
.hc .mt{font-size:11px;color:var(--m)}
.gr{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px;margin-bottom:16px}
.gi{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 8px;border-radius:var(--r);background:#FFF;border:1px solid var(--e);cursor:pointer;box-shadow:var(--sh);font-size:11px;color:var(--t)}

/* Scan */
.scan-area{display:flex;flex-direction:column;align-items:center;justify-content:center;margin:16px;padding:40px 20px;background:var(--s);border-radius:16px;border:2px dashed var(--e);cursor:pointer}
.scan-area svg{width:48px;height:48px;stroke:var(--m);margin-bottom:12px}
.scan-area .t1{font-size:16px;font-weight:600;color:var(--p)}
.scan-area .t2{font-size:13px;color:var(--m);margin-top:4px}
.preview-img{width:100%;max-height:300px;object-fit:contain;border-radius:var(--r);margin:8px 0}

/* Form */
.fm{padding:0 16px 16px}
.fm label{display:block;font-size:12px;font-weight:600;color:var(--p);margin-bottom:4px;margin-top:12px}
.fm input,.fm select,.fm textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--e);background:#FFF;font-size:14px;outline:none;font-family:var(--fb)}
.fm textarea{height:60px;resize:vertical}
.btn{width:100%;padding:12px;border-radius:8px;border:none;font-size:15px;font-weight:600;cursor:pointer}
.btn.pri{background:var(--p);color:#FFF}
.btn.gold{background:var(--g);color:#FFF}
.btn.out{background:transparent;border:1px solid var(--p);color:var(--p)}

/* Grid */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px}
.sc{background:#FFF;border-radius:var(--r);border:1px solid var(--e);overflow:hidden;cursor:pointer}
.sc .th{width:100%;height:100px;display:flex;align-items:center;justify-content:center;background:var(--s);font-size:28px;color:var(--g)}
.sc .if{padding:8px 10px}
.sc .nm{font-weight:600;font-size:13px}
.sc .pr{font-size:12px;color:var(--d);font-weight:600;margin-top:2px}

/* Search */
.sb{padding:8px 16px}
.sb input{width:100%;padding:10px 14px;border-radius:999px;border:1px solid var(--e);background:#FFF;font-size:14px;box-shadow:var(--sh);outline:none}
.fl{display:flex;gap:6px;padding:4px 16px 8px;overflow-x:auto}
.fl span{padding:4px 12px;border-radius:999px;background:#FFF;border:1px solid var(--e);font-size:12px;cursor:pointer;white-space:nowrap;color:var(--t)}
.fl span.a{background:var(--p);color:#FFF;border-color:var(--p)}

/* Detail */
.dhdr{display:flex;justify-content:space-between;align-items:center;padding:0 16px 8px}
.dhdr h2{font-family:var(--fd);font-size:18px;font-weight:700;flex:1}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 16px}
.di{background:var(--s);border-radius:8px;padding:10px;border:1px solid var(--e)}
.di .l{font-size:11px;color:var(--m)}
.di .v{font-size:14px;font-weight:600;font-family:var(--fd);margin-top:2px}
.db{background:#FFF;border-radius:var(--r);padding:14px;box-shadow:var(--sh);border:1px solid var(--e);margin:0 16px 12px}
.db h3{font-size:14px;color:var(--p);margin-bottom:6px}
.db p{font-size:13px;line-height:1.6;color:var(--t)}

/* Toasts */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--i);color:#FFF;padding:10px 20px;border-radius:999px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s}
.toast.s{opacity:1}
.loading{text-align:center;padding:20px;color:var(--m)}
.spin{width:24px;height:24px;border:2px solid var(--e);border-top-color:var(--g);border-radius:50%;animation:sp .6s linear infinite;margin:0 auto 8px}
@keyframes sp{to{transform:rotate(360deg)}}

/* Profile */
.ph{text-align:center;padding:24px 16px 12px}
.pa{width:64px;height:64px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:26px;color:#FFF}
.pm{padding:0 16px}
.pmi{display:flex;justify-content:space-between;padding:14px;background:#FFF;border-radius:var(--r);margin-bottom:8px;cursor:pointer;box-shadow:var(--sh);border:1px solid var(--e)}
.pmi .t{font-size:14px;font-weight:500}
.pmi .a{color:var(--m)}

.empty{text-align:center;padding:60px 20px;color:var(--m);font-size:14px}
</style>
</head>
<body>

<div class="p a" id="home">
  <div style="padding:20px 16px 0">
    <h1 style="font-family:var(--fd);color:var(--p);font-size:22px">邮藏集</h1>
    <p style="font-size:13px;color:var(--t)">AI 智能识别 · 邮票收藏管理</p>
  </div>
  <div class="st">
    <div class="sti"><div class="n" id="h-total">0</div><div class="l">藏品</div></div>
    <div class="sti"><div class="n" id="h-ai">0</div><div class="l">AI识别</div></div>
    <div class="sti"><div class="n" id="h-dyn">0</div><div class="l">朝代</div></div>
  </div>
  <div style="padding:0 16px;font-weight:600;font-size:14px;color:var(--p);margin-bottom:8px">最近添加</div>
  <div class="scr" id="recent"></div>
  <div class="gr">
    <div class="gi" onclick="go('scan')"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke="var(--p)" fill="none" stroke-width="1.8"/><circle cx="12" cy="13" r="4" stroke="var(--p)" fill="none" stroke-width="1.8"/></svg><span>拍照识别</span></div>
    <div class="gi" onclick="go('collect')"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" stroke="var(--p)" fill="none" stroke-width="1.8"/></svg><span>我的收藏</span></div>
    <div class="gi" onclick="go('search')"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" stroke="var(--p)" fill="none" stroke-width="1.8"/><path d="M21 21l-4.35-4.35" stroke="var(--p)" fill="none" stroke-width="1.8"/></svg><span>查询</span></div>
    <div class="gi" onclick="go('profile')"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" stroke="var(--p)" fill="none" stroke-width="1.8"/><path d="M20 21a8 8 0 10-16 0" stroke="var(--p)" fill="none" stroke-width="1.8"/></svg><span>我的</span></div>
  </div>
</div>

<div class="p" id="scan">
  <div class="tb"><h1>AI 识别</h1><div style="width:36px"></div></div>
  <div class="scan-area" id="scanArea" onclick="pickImage()">
    <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" fill="none" stroke-width="1.8"/><circle cx="12" cy="13" r="4" fill="none" stroke-width="1.8"/></svg>
    <div class="t1">点击拍照或选择照片</div>
    <div class="t2">支持相册选择或相机拍摄</div>
  </div>
  <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" onchange="handleImage(this)">
  <div id="aiResult"></div>
  <div class="fm" id="saveForm" style="display:none">
    <label>邮票名称</label><input id="f-name">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><label>年代/朝代</label><input id="f-dyn" placeholder="清代"></div>
      <div><label>发行年份</label><input id="f-year" placeholder="1878"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><label>面值</label><input id="f-face" placeholder="壹分银"></div>
      <div><label>分类</label><select id="f-cat"><option>经典</option><option>纪特</option><option>民国</option><option>文革</option><option>生肖</option><option>普票</option></select></div>
    </div>
    <label>描述</label><textarea id="f-desc" placeholder="AI 识别结果描述"></textarea>
    <label>参考价格</label><input id="f-price" placeholder="如 ¥8,500">
    <button class="btn pri" onclick="saveStamp()" style="margin-top:12px">保存到收藏</button>
    <button class="btn out" onclick="retake()" style="margin-top:8px">重新拍照</button>
  </div>
</div>

<div class="p" id="collect">
  <div class="tb"><h1>我的收藏</h1><div style="width:36px"></div></div>
  <div class="sg" id="collGrid"></div>
</div>

<div class="p" id="search">
  <div class="tb"><h1>查询</h1><div style="width:36px"></div></div>
  <div class="sb"><input id="sq" placeholder="搜索名称、朝代、分类..." oninput="doSearch()"></div>
  <div class="fl"><span class="a" onclick="sf(this,'all')">全部</span><span onclick="sf(this,'清代')">清代</span><span onclick="sf(this,'民国')">民国</span><span onclick="sf(this,'新中国')">新中国</span></div>
  <div class="sg" id="searchGrid"></div>
</div>

<div class="p" id="detail">
  <div class="tb"><div class="ni" style="padding:0;min-width:auto" onclick="bh()"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7" stroke="var(--p)" fill="none" stroke-width="2"/></svg></div><h1>藏品详情</h1><div style="width:36px"></div></div>
  <div id="detailContent"></div>
</div>

<div class="p" id="profile">
  <div class="tb"><h1>我的</h1><div style="width:36px"></div></div>
  <div class="ph">
    <div class="pa">邮</div>
    <div style="font-size:18px;font-weight:700">集邮者</div>
    <div style="font-size:12px;color:var(--t)">邮票识别 · 收藏管理</div>
  </div>
  <div class="st">
    <div class="sti"><div class="n" id="p-total">0</div><div class="l">藏品</div></div>
    <div class="sti"><div class="n" id="p-ai">0</div><div class="l">AI识别</div></div>
    <div class="sti"><div class="n" id="p-dyn">0</div><div class="l">朝代</div></div>
  </div>
  <div class="pm">
    <div class="pmi" onclick="exportData()"><span class="t">导出数据</span><span class="a">›</span></div>
    <div class="pmi" onclick="clearData()"><span class="t">清空所有数据</span><span class="a">›</span></div>
  </div>
</div>

<nav class="nav">
  <div class="ni a" onclick="nv('home',this)"><svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span>首页</span></div>
  <div class="ni" onclick="nv('scan',this)"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg><span>识别</span></div>
  <div class="ni" onclick="nv('collect',this)"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"/></svg><span>收藏</span></div>
  <div class="ni" onclick="nv('profile',this)"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg><span>我的</span></div>
</nav>

<div class="toast" id="toast"></div>
<div class="toast" id="loading" style="background:rgba(0,0,0,0.8);padding:15px 25px"><div class="spin"></div><div style="font-size:13px">AI 识别中...</div></div>

<script>
// ===== DATA =====
var DB_KEY = 'youcangji_stamps';
var stamps = JSON.parse(localStorage.getItem(DB_KEY) || '[]');

// ===== API =====
var API_KEY = 'sk-ws-H.RXIHRLM.svtl.MEQCIFGGBFw2qBtHhpYmb_-7cUy2gAPlDX_2CKMquiw1r8lxAiBi093MxdwVBxLwnDLR0nAdHpILJ_Re0pJZVPN5NVFzuQ';
var API_URL = 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';

async function callAI(base64Image) {
  showLoad(true);
  try {
    var resp = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
      body: JSON.stringify({
        model: 'qwen3.7-plus',
        messages: [{
          role: 'user',
          content: [
            {type:'text', text:'你是一个邮票鉴定专家。请识别这张邮票图片，输出JSON格式：{"name":"邮票名称","dynasty":"朝代","year":"发行年份","faceValue":"面值","category":"分类(经典/纪特/民国/文革/生肖/普票)","description":"详细描述(材质/印刷/历史背景/收藏价值)","estimatedPrice":"估计市场参考价格"}。如果无法识别，请输出你最好的推测。只输出JSON，不要其他文字。'},
            {type:'image_url', image_url:{url:'data:image/jpeg;base64,'+base64Image}}
          ]
        }],
        max_tokens:1024,
        response_format:{type:'json_object'}
      })
    });
    var data = await resp.json();
    var text = data.choices[0].message.content;
    return JSON.parse(text);
  } catch(e) {
    console.error(e);
    // Fallback: try to extract JSON from response
    try {
      var text2 = data?.choices?.[0]?.message?.content || '{}';
      return JSON.parse(text2.replace(/```json/g,'').replace(/```/g,''));
    } catch(e2) {
      return null;
    }
  } finally {
    showLoad(false);
  }
}

// ===== Image Picker =====
function pickImage() { document.getElementById('fileInput').click(); }

function handleImage(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = e.target.result.split(',')[1];
    document.getElementById('scanArea').innerHTML = '<img src="data:image/jpeg;base64,'+base64+'" class="preview-img">';
    window._currentImage = base64;
    recognizeStamp(base64);
  };
  reader.readAsDataURL(file);
}

async function recognizeStamp(base64) {
  var result = document.getElementById('aiResult');
  result.innerHTML = '<div class="loading">AI 识别中...<div class="spin" style="margin:8px auto"></div></div>';

  var data = await callAI(base64);

  if (data) {
    document.getElementById('f-name').value = data.name || '';
    document.getElementById('f-dyn').value = data.dynasty || '';
    document.getElementById('f-year').value = data.year || '';
    document.getElementById('f-face').value = data.faceValue || '';
    document.getElementById('f-desc').value = data.description || '';
    document.getElementById('f-price').value = data.estimatedPrice || '';
    if (data.category) document.getElementById('f-cat').value = data.category;

    result.innerHTML = '<div style="background:#E8F5E9;color:#2E7D32;padding:10px 16px;margin:8px 16px;border-radius:8px;font-size:13px">✅ AI 识别完成，请确认并保存</div>';
    document.getElementById('saveForm').style.display = 'block';
  } else {
    result.innerHTML = '<div style="background:#FFF3E0;color:#E65100;padding:10px 16px;margin:8px 16px;border-radius:8px;font-size:13px">⚠️ AI 识别失败，请手动输入信息</div>';
    document.getElementById('saveForm').style.display = 'block';
  }
}

function saveStamp() {
  var s = {
    id: Date.now().toString(),
    name: document.getElementById('f-name').value.trim(),
    dynasty: document.getElementById('f-dyn').value.trim(),
    year: document.getElementById('f-year').value.trim(),
    faceValue: document.getElementById('f-face').value.trim(),
    category: document.getElementById('f-cat').value,
    description: document.getElementById('f-desc').value.trim(),
    price: document.getElementById('f-price').value.trim(),
    image: window._currentImage || '',
    aiRecognized: !!window._currentImage,
    createdAt: new Date().toISOString().slice(0,10),
  };
  if (!s.name) { toast('请输入邮票名称'); return; }

  stamps.push(s);
  localStorage.setItem(DB_KEY, JSON.stringify(stamps));
  toast('✅ 已保存到收藏');
  updateStats();
  renderAll();
  retake();
  go('collect');
}

function retake() {
  document.getElementById('scanArea').innerHTML = '<svg viewBox="0 0 24 24" width="48" height="48"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" fill="none" stroke-width="1.8"/><circle cx="12" cy="13" r="4" fill="none" stroke-width="1.8"/></svg><div class="t1">点击拍照或选择照片</div><div class="t2">支持相册选择或相机拍摄</div>';
  document.getElementById('aiResult').innerHTML = '';
  document.getElementById('saveForm').style.display = 'none';
  window._currentImage = null;
  document.getElementById('fileInput').value = '';
}

// ===== Delete =====
function deleteStamp(id) {
  if (!confirm('确定删除这条记录？')) return;
  stamps = stamps.filter(function(s){return s.id !== id});
  localStorage.setItem(DB_KEY, JSON.stringify(stamps));
  updateStats();
  renderAll();
  bh();
  toast('已删除');
}

// ===== Navigation =====
function go(id){document.querySelectorAll('.p').forEach(function(p){p.classList.remove('a')});document.getElementById(id).classList.add('a')}
function nv(id,el){go(id);document.querySelectorAll('.ni').forEach(function(x){x.classList.remove('a')});if(el)el.classList.add('a')}
function bh(){go('home');document.querySelectorAll('.ni')[0].classList.add('a')}

// ===== Render =====
function renderAll() {
  renderRecent();
  renderCollection();
  renderSearch();
}

function renderRecent() {
  var c = document.getElementById('recent');
  var list = stamps.slice(-6).reverse();
  c.innerHTML = list.length ? list.map(function(s){
    return '<div class="hc" onclick="showDetail(\''+s.id+'\')"><div class="th">邮</div><div class="if"><div class="nm">'+(s.name||'未知')+'</div><div class="mt">'+s.dynasty+' · '+s.createdAt+'</div></div></div>';
  }).join('') : '<div style="font-size:13px;color:var(--m);padding:20px 0">还没有藏品，快去拍照识别吧</div>';
}

function renderCollection() {
  var c = document.getElementById('collGrid');
  c.innerHTML = stamps.length ? stamps.slice().reverse().map(function(s){
    return '<div class="sc" onclick="showDetail(\''+s.id+'\')"><div class="th">邮</div><div class="if"><div class="nm">'+(s.name||'未知')+'</div><div class="pr">'+(s.dynasty||'')+'</div></div></div>';
  }).join('') : '<div class="empty">还没有收藏的邮票</div>';
}

function renderSearch() {
  doSearch();
}

function doSearch() {
  var q = document.getElementById('sq').value.trim().toLowerCase();
  var a = document.querySelector('#search .fl .a');
  var cat = a ? a.textContent : '全部';
  var list = stamps.filter(function(s){
    if (cat !== '全部' && s.category !== cat && s.dynasty !== cat) return false;
    if (q && s.name.toLowerCase().indexOf(q) < 0 && s.dynasty.toLowerCase().indexOf(q) < 0 && s.category.toLowerCase().indexOf(q) < 0) return false;
    return true;
  });
  var c = document.getElementById('searchGrid');
  c.innerHTML = list.length ? list.map(function(s){
    return '<div class="sc" onclick="showDetail(\''+s.id+'\')"><div class="th">邮</div><div class="if"><div class="nm">'+(s.name||'未知')+'</div><div class="pr">'+s.dynasty+'</div></div></div>';
  }).join('') : '<div class="empty">没有匹配结果</div>';
}

function sf(el, cat) {
  document.querySelectorAll('#search .fl span').forEach(function(x){x.classList.remove('a')});
  el.classList.add('a');
  doSearch();
}

function showDetail(id) {
  var s = stamps.find(function(x){return x.id === id});
  if (!s) return;
  go('detail');
  var html = '';
  if (s.image) html += '<img src="data:image/jpeg;base64,'+s.image+'" class="preview-img" style="margin:8px 16px;width:calc(100%-32px)">';
  html += '<div class="dhdr"><h2>'+(s.name||'未知')+'</h2><span style="color:var(--m);font-size:12px">'+s.createdAt+'</span></div>';
  html += '<div class="dg"><div class="di"><div class="l">年代</div><div class="v">'+(s.dynasty||'-')+'</div></div><div class="di"><div class="l">年份</div><div class="v">'+(s.year||'-')+'</div></div><div class="di"><div class="l">面值</div><div class="v">'+(s.faceValue||'-')+'</div></div><div class="di"><div class="l">分类</div><div class="v">'+(s.category||'-')+'</div></div></div>';
  if (s.description) html += '<div class="db"><h3>描述</h3><p>'+s.description+'</p></div>';
  if (s.price) html += '<div class="db"><h3>参考价格</h3><p style="color:var(--d);font-weight:600;font-size:16px">'+s.price+'</p></div>';
  html += '<div style="padding:0 16px 16px"><button class="btn" style="background:var(--d);color:#FFF;border:none;padding:10px;border-radius:8px;width:100%;cursor:pointer" onclick="deleteStamp(\''+s.id+'\')">删除</button></div>';
  document.getElementById('detailContent').innerHTML = html;
}

// ===== Stats =====
function updateStats() {
  var dyns = {}; stamps.forEach(function(s){if(s.dynasty)dyns[s.dynasty]=1});
  var dynCount = Object.keys(dyns).length;
  var aiCount = stamps.filter(function(s){return s.aiRecognized}).length;
  document.getElementById('h-total').textContent = stamps.length;
  document.getElementById('h-ai').textContent = aiCount;
  document.getElementById('h-dyn').textContent = dynCount;
  document.getElementById('p-total').textContent = stamps.length;
  document.getElementById('p-ai').textContent = aiCount;
  document.getElementById('p-dyn').textContent = dynCount;
}

// ===== Utility =====
function toast(msg) {var t=document.getElementById('toast');t.textContent=msg;t.classList.add('s');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('s')},2000)}
function showLoad(v){document.getElementById('loading').classList.toggle('s',v)}

function exportData() {
  var json = JSON.stringify(stamps, null, 2);
  var blob = new Blob([json], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'youcangji_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  toast('✅ 数据已导出');
}

function clearData() {
  if (!confirm('确定清空所有数据？此操作不可恢复！')) return;
  if (!confirm('再次确认：将删除全部 '+stamps.length+' 条记录！')) return;
  stamps = [];
  localStorage.setItem(DB_KEY, JSON.stringify(stamps));
  updateStats();
  renderAll();
  toast('已清空');
}

// ===== Init =====
updateStats();
renderAll();

// PWA install
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('service-worker.js');
  });
}

// Install banner
var dp;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  dp = e;
  // Show install banner
  var banner = document.createElement('div');
  banner.id = 'installBanner';
  banner.style.cssText = 'position:fixed;bottom:80px;left:0;right:0;max-width:430px;margin:0 auto;background:var(--p);color:#FFF;padding:12px 16px;z-index:999;display:flex;align-items:center;gap:12px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.3)';
  banner.innerHTML = '<div style="flex:1"><div style="font-weight:600;font-size:14px">邮藏集</div><div style="font-size:11px;opacity:0.8">安装到桌面，像 App 一样使用</div></div><button id="installBtn" style="padding:6px 16px;border-radius:999px;background:#FFF;color:var(--p);border:none;font-size:13px;font-weight:600;cursor:pointer">安装</button>';
  document.body.appendChild(banner);
  document.getElementById('installBtn').onclick = function() {
    if (dp) { dp.prompt(); dp.userChoice.then(function(){dp=null;banner.remove()}); }
  };
});
</script>
</body>
